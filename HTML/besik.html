<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strok - Fixed CRUD</title>
    <style>
        /* 🌌 ตกแต่งโครงสร้างหน้าเว็บและธีมพื้นหลัง */
        body {
            background-color: #0d1117; /* ดำสนิทระดับสากล */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 📦 การ์ดสำหรับกรอกข้อมูล (สวยหรู) */
        .app-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            text-align: center;
            box-sizing: border-box;
            margin-bottom: 30px;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 20px;
            color: #58a6ff;
            font-weight: 600;
        }

        /* ✏️ ช่องกรอก Input */
        .wrapper {
            margin-bottom: 15px;
        }

        #name {
            width: 100%;
            padding: 12px;
            background-color: #0d1117;
            border: 2px solid #30363d;
            border-radius: 6px;
            color: #ffffff;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        #name:focus {
            outline: none;
            border-color: #58a6ff;
            box-shadow: 0 0 8px rgba(88, 166, 255, 0.2);
        }

        /* 🕹️ ปุ่ม Submit */
        #submit {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #238636 0%, #2ea043 100%);
            border: none;
            border-radius: 6px;
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(46, 160, 67, 0.4);
        }

        /* 📋 พื้นที่รวมกลุ่มรายการที่แสดงเพิ่มเรื่อย ๆ */
        .list-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 🏷️ กล่องบันทึกข้อมูลแต่ละกล่อง */
        .item-box {
            background-color: #21262d;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .item-text {
            color: #c9d1d9;
            font-size: 16px;
            word-break: break-all;
            padding-right: 15px;
        }

        /* ⚙️ โซนปุ่มภายในกล่อง */
        .btn-group {
            display: flex;
            gap: 8px;
        }

        .btn-edit {
            background-color: #388bfd; /* เปลี่ยนปุ่มแก้ไขเป็นสีฟ้าเฉียบ ๆ */
            color: white;
            border: none;
            border-radius: 4px;
            padding: 6px 12px;
            cursor: pointer;
            font-weight: 500;
        }
        .btn-edit:hover { background-color: #58a6ff; }

        .btn-delete {
            background-color: #da3637; /* ปุ่มลบสีแดงเพลิง */
            color: white;
            border: none;
            border-radius: 4px;
            padding: 6px 12px;
            cursor: pointer;
            font-weight: 500;
        }
        .btn-delete:hover { background-color: #f85149; }
    </style>
</head>
<body>

    <div class="app-card">
        <h2>Besik Account</h2>
        <div class="wrapper">
            <input type="text" id="name" placeholder="Enter name to add...">
        </div>
        <div class="Box">
            <button id="submit">Submit</button>
        </div>
    </div>

    <div class="list-container" id="listContainer"></div>

    <script>
        const submitBtn = document.getElementById('submit');
        const nameInput = document.getElementById('name');
        const listContainer = document.getElementById('listContainer');
        
        // 🛠️ [ย้ายจุดประกาศ] ออกมานอกฟังก์ชันคลิก เพื่อไม่ให้ค่าโดนรีเซ็ต
        let isEditing = false;
        let editTarget = null;

        // 🟢 ฟังก์ชันเมื่อมีการกดส่งข้อมูล
        submitBtn.addEventListener('click', () => {
            const name = nameInput.value.trim();
            
            if (name === "") {
                alert("กรุณากรอกข้อมูลก่อนกด Submit ครับ!");
                return;
            }

            if (isEditing) {
                // 🔄 โหมดแก้ไข: เอาข้อความใหม่ไปเปลี่ยนแทนตัวเดิมในเป้าหมายที่เราล็อกไว้
                editTarget.querySelector('.item-text').innerText = name;

                // รีเซ็ตปุ่มและสถานะกลับสู่โหมดเพิ่มปกติ
                submitBtn.innerText = "Submit";
                submitBtn.style.background = "linear-gradient(135deg, #238636 0%, #2ea043 100%)";
                isEditing = false;
                editTarget = null;
            } else {
                // ➕ โหมดเพิ่มข้อมูลใหม่: สร้างกล่อง item-box ขึ้นมาใหม่
                const itemBox = document.createElement('div');
                itemBox.className = 'item-box';
                
                // 🛠️ [ซ่อมตัวแปร] เปลี่ยนจาก ${dataText} เป็น ${name} ให้ตรงตามด้านบน
                itemBox.innerHTML = `
                    <div class="item-text">${name}</div>
                    <div class="btn-group">
                        <button class="btn-edit">แก้ไข</button>
                        <button class="btn-delete">ลบ</button>
                    </div>
                `;

                // 🔴 คำสั่งสำหรับปุ่มลบ
                const deleteBtn = itemBox.querySelector('.btn-delete');
                deleteBtn.addEventListener('click', () => {
                    itemBox.remove();
                });

                // 🟡 คำสั่งสำหรับปุ่มแก้ไข
                const editBtn = itemBox.querySelector('.btn-edit');
                editBtn.addEventListener('click', () => {             
                    nameInput.value = itemBox.querySelector('.item-text').innerText;
                    nameInput.focus();
                    
                    submitBtn.innerText = "Update";
                    submitBtn.style.background = "linear-gradient(135deg, #ff6a00 0%, #ee0979 100%)";
                    
                    isEditing = true;
                    editTarget = itemBox; // ล็อกเป้าหมายกล่องปัจจุบันเอาไว้
                });

                // นำกล่องที่สร้างเสร็จไปหย่อนต่อท้ายใน container แสดงผลยาวลงไปเรื่อย ๆ
                listContainer.appendChild(itemBox);
            }

            // เคลียร์ช่องให้ว่างพร้อมกรอกชื่อถัดไป
            nameInput.value = "";
        });

        // 🛠️ [ย้ายจุดประกาศ] แยกคำสั่งตรวจจับคีย์บอร์ด Enter ออกมาอยู่ด้านนอกสุดอย่างอิสระ
        nameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                submitBtn.click();
            }
        });

    </script>
</body>
</html>
