<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        background: #f4f6f9;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
        padding-top: 50px;
    }

    .container {
        background: white;
        width: 400px;
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    h1 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
    }

    .container > div {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
    }

    #input-go-to {
        flex: 1;
        padding: 10px;
        border: 2px solid #ddd;
        border-radius: 8px;
        outline: none;
        transition: 0.3s;
    }

    #input-go-to:focus {
        border-color: #4CAF50;
    }

    #btn-go-to {
        padding: 10px 20px;
        border: none;
        background: #4CAF50;
        color: white;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
    }

    #btn-go-to:hover {
        background: #45a049;
    }

    #number-list {
        list-style: none;
    }

    /* --- แก้ไขสไตล์ตรงนี้เพื่อให้ปุ่มจัดกลุ่มอย่างสวยงาม --- */
    #number-list li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #f8f9fa;
        padding: 12px 16px;
        margin-bottom: 10px;
        border-radius: 12px; /* เพิ่มความโค้งมนให้เหมือนรูปตัวอย่าง */
        border-left: 5px solid #4CAF50;
    }

    /* กล่องข้อความด้านซ้าย */
    #number-list li span {
        font-size: 16px;
        color: #333;
        word-break: break-all;
    }

    /* จัดกลุ่มปุ่มให้อยู่ฝั่งขวาและเว้นระยะห่างระหว่างกัน */
    #number-list li .btn-group {
        display: flex;
        gap: 8px; 
    }

    #number-list li button {
        color: white;
        border: none;
        padding: 6px 14px;
        border-radius: 8px; /* ปรับให้โค้งมนเหลี่ยมสวยตามรูป */
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
    }

    /* ปุ่มลบ (สีแดง) */
    #number-list li .btn-delete {
        background: #ff4d4d;
    }

    #number-list li .btn-delete:hover {
        background: #e60000;
    }

    /* ปุ่มแก้ไข (สีเหลือง) */
    #number-list li .btn-edit {
        background: #FFD000;
        color: white;
    }

    #number-list li .btn-edit:hover {
        background: #e6bc00;
    }
</style>
<body>
    <div class="container">
        <h1>Go To</h1>
        
        <div>
            <input type="text" id="input-go-to" placeholder="Enter a number">
            <button id="btn-go-to">Go</button>
        </div>

        <ul id="number-list"></ul>
    </div>

    <script>
        const inputGoto = document.getElementById('input-go-to');
        const btnGoto = document.getElementById('btn-go-to');
        const numberList = document.getElementById('number-list');

        btnGoto.addEventListener('click', () => {
            const numberValue = inputGoto.value;

            if (numberValue.trim() === "") {
                alert("กรุณากรอกข้อมูล");
                return;
            }

            const li = document.createElement('li');

            // 1. สร้างตัวครอบข้อความ (Span) เพื่อไม่ให้กระทบกับปุ่ม
            const textSpan = document.createElement('span');
            textSpan.textContent = numberValue;
            li.appendChild(textSpan);

            // 2. สร้างกล่องสำหรับรวมปุ่มลบและปุ่มแก้ไขเข้าด้วยกัน (Button Group)
            const btnGroup = document.createElement('div');
            btnGroup.className = 'btn-group';

            // ปุ่มลบ
            const delBtn = document.createElement('button');
            delBtn.className = 'btn-delete';
            delBtn.textContent = "ลบ";
            delBtn.addEventListener('click', () => {
                li.remove();
            });

            // ปุ่มแก้ไข
            const editBtn = document.createElement('button');
            editBtn.className = 'btn-edit';
            editBtn.textContent = "แก้ไข";
            editBtn.addEventListener('click', () => {
                inputGoto.value = textSpan.textContent; // ดึงค่าจาก textSpan โดยตรง ปลอดภัยกว่า
                li.remove();
            });

            // นำปุ่มทั้งสองใส่เข้าไปในกลุ่มปุ่มก่อน
            btnGroup.appendChild(delBtn);
            btnGroup.appendChild(editBtn);

            // นำกลุ่มปุ่มไปต่อท้ายใน li
            li.appendChild(btnGroup);
            
            numberList.appendChild(li);
            inputGoto.value = "";
        });

        inputGoto.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                btnGoto.click();
            }
        });
    </script>
</body>
</html>
